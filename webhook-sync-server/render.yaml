services:
  - type: web
    name: lwdigitalforge-sync-server
    env: docker
    dockerfilePath: ./webhook-sync-server/Dockerfile
    dockerContext: ./webhook-sync-server
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: SYNC_API_KEY
        generateValue: true
      - key: PORT
        value: 5000

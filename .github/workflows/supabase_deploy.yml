name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main # Garanta que 'main' é sua branch principal

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: wwwwwyuwighdahmvnokrl # Seu Project ID

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.1' # Versão do seu .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci 
        # Instala dependências do package-lock.json, incluindo o supabase CLI

      - name: Link Supabase Project
        run: npx supabase link --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy Supabase Migrations
        run: npx supabase db push # Aplica migrações da pasta supabase/migrations

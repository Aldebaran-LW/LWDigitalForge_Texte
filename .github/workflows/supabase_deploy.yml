name: Deploy Supabase Migrations to Production

on:
  push:
    branches:
      - main # Apenas branch principal (produção)

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Supabase Secrets
        run: |
          set -euo pipefail
          echo "🔐 Validando secrets do Supabase..."
          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "❌ SUPABASE_PROJECT_REF não configurado (GitHub Secrets)."
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "❌ SUPABASE_DB_PASSWORD não configurado (GitHub Secrets)."
            echo "   (O log atual mostra que ele está vazio; o Supabase CLI precisa dele para db push.)"
            exit 1
          fi
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "❌ SUPABASE_ACCESS_TOKEN não configurado (GitHub Secrets)."
            exit 1
          fi
          case "${SUPABASE_ACCESS_TOKEN}" in
            sbp_*) echo "✅ SUPABASE_ACCESS_TOKEN parece válido (sbp_…)" ;;
            *)
              echo "❌ SUPABASE_ACCESS_TOKEN inválido."
              echo "   Gere um Access Token em: Supabase Account → Access Tokens (formato sbp_...)."
              exit 1
              ;;
          esac

      - name: Link Supabase Project
        run: supabase link --project-ref $SUPABASE_PROJECT_REF
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify Migrations Before Deploy
        run: |
          echo "🔍 Verificando migrations antes do deploy..."
          if [ ! -d "supabase/migrations" ]; then
            echo "❌ Erro: Pasta supabase/migrations não encontrada!"
            exit 1
          fi
          MIGRATION_COUNT=$(find supabase/migrations -name "*.sql" | wc -l)
          echo "✅ Encontradas $MIGRATION_COUNT migrations"
          if [ "$MIGRATION_COUNT" -eq 0 ]; then
            echo "⚠️ Aviso: Nenhuma migration encontrada"
          fi

      - name: Deploy Migrations to Production
        run: supabase db push # Aplica migrações no banco de produção

name: Deploy Supabase Migrations to Production

on:
  push:
    branches:
      - main # Apenas branch principal (produção)

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "❌ Missing secret: SUPABASE_PROJECT_REF"
            exit 1
          fi

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "❌ Missing secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          if [[ "${SUPABASE_ACCESS_TOKEN}" != sbp_* ]]; then
            echo "❌ SUPABASE_ACCESS_TOKEN inválido. Deve começar com 'sbp_' (Access Token do Supabase Account)."
            exit 1
          fi

          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "❌ Missing secret: SUPABASE_DB_PASSWORD (senha do banco do Supabase)."
            exit 1
          fi

      - name: Link Supabase Project
        run: supabase link --project-ref $SUPABASE_PROJECT_REF
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify Migrations Before Deploy
        run: |
          echo "🔍 Verificando migrations antes do deploy..."
          if [ ! -d "supabase/migrations" ]; then
            echo "❌ Erro: Pasta supabase/migrations não encontrada!"
            exit 1
          fi
          MIGRATION_COUNT=$(find supabase/migrations -name "*.sql" | wc -l)
          echo "✅ Encontradas $MIGRATION_COUNT migrations"
          if [ "$MIGRATION_COUNT" -eq 0 ]; then
            echo "⚠️ Aviso: Nenhuma migration encontrada"
          fi

      - name: Deploy Migrations to Production
        run: supabase db push --password "$SUPABASE_DB_PASSWORD" --yes # Aplica migrações no banco de produção

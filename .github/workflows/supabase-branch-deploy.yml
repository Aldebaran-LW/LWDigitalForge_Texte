name: Deploy to Supabase Branch (Development)

on:
  push:
    branches:
      - feat/supabase-registered-apps-integration
  workflow_dispatch:

jobs:
  deploy-to-branch:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # Usa projeto de desenvolvimento se configurado, senão usa o principal
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID_DEV || 'wwwwyuwighdehmvnolrl' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Development Project
        run: |
          echo "🔗 Linkando ao projeto de desenvolvimento: $SUPABASE_PROJECT_ID"
          supabase link --project-ref $SUPABASE_PROJECT_ID
          echo "✅ Linkado com sucesso!"

      - name: Verify Migrations Before Deploy
        run: |
          echo "🔍 Verificando migrations antes do deploy..."
          if [ ! -d "supabase/migrations" ]; then
            echo "❌ Erro: Pasta supabase/migrations não encontrada!"
            exit 1
          fi
          MIGRATION_COUNT=$(find supabase/migrations -name "*.sql" | wc -l)
          echo "✅ Encontradas $MIGRATION_COUNT migrations"
          if [ "$MIGRATION_COUNT" -eq 0 ]; then
            echo "⚠️ Aviso: Nenhuma migration encontrada"
          fi
          # Listar migrations que serão aplicadas
          echo "📋 Migrations que serão aplicadas:"
          ls -la supabase/migrations/*.sql || echo "Nenhuma migration encontrada"

      - name: Deploy Migrations to Branch
        run: supabase db push

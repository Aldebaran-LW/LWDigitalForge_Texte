name: 🤖 Liberação Automática

on:
  schedule:
    # Executa a cada hora (ajuste conforme necessário)
    - cron: '0 * * * *'
  workflow_dispatch: # Permite execução manual
  push:
    branches:
      - main
    paths:
      - 'scripts/agente-liberacao-automatica.js'

jobs:
  liberacao-automatica:
    name: Atualizar Status de Liberação
    runs-on: ubuntu-latest
    
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: 📦 Instalar dependências
        run: npm ci
      
      - name: 🤖 Executar Agente de Liberação Automática
        run: node scripts/agente-liberacao-automatica.js
      
      - name: 📧 Notificar em caso de falha (opcional)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Workflow falhou - verificar logs')
            // Adicionar notificação por email/webhook aqui se necessário
